      <script>
  let responses = [
"aren't you bored yet? everything burst forth",
"everything burst forth",
"Claudia Rankine's 'This is the most miserable in my life' -- obliteration",
"dirty from playing outside",
"birds with stripes on their heads",
"your ringlets appear",
"best burger of my life",
"as important to me as God",
]
    
    function marching(){
      document.querySelector("h2").innerText = choice (responses)
    }
    
    function choice(list){
      return list [Math.floor(Math.random() * list.length)]
    }
</script>
