            var i = 0;
var txt = 'It Makes Itself \n It Makes Itself Unknown To Thee \n Maybe These Poems Are Polyps \n March is long and goes on. I went on about it, about the days and the weeks overlapping. Its April now, theres a man walking laps in the parking lot, and a few minutes ago I thought "Wow this weather is perfect for a cigarette" but I dont want just any cigarette, I want one that A has rolled for me. The other day, the 31st, I had a sort of transcendent experience reading part of Jack Spicers Unvert Manifesto -- I felt keenly aware of writings ability to be both expansive and completely specific. In other words, I was SURPRISED.';
var speed = 50;

function typeWriter1() {
  if (i < txt.length) {
    document.getElementById("demo1").innerHTML += txt.charAt(i);
    i++;
    setTimeout(typeWriter1, speed);
  }
}

      var i2 = 0;
var txt2 = 'So I was reading Spicers "Unvert Manifesto," and theres a few  brilliantly funny lines about the Dadaists and their failed project: "All these men too obsessed with the mechanism of their subject...the frog Dada poets were mere bleeding-hearted sexual liberals who started out by proclaiming the absolute mastery of Dada and ended up writing poems about how nice their wives tits look." Part of why I like this so much is because Im still hung up on the horrible Man Ray exhibit I went to in January. And at the end of February, I watched "Un Chien Andalou" (which, ok, is Surrealist, not Dadaist) and felt similarly frustrated, unmoved and uninterested in the idea that our unconscious world stems from and revolves around sex and violence against women. Maybe this frustration betrays the fact that Im also a bleeding-hearted liberal, but I believe in a stranger world than that.';
var speed2 = 50;

function typeWriter2() {
  if (i2 < txt2.length) {

  }
