  let responses = [
"tremor",

"there’s no",
"not one",
"stone",

"that stir beneath",
"my safety",
"obscurity",
"this gesture",
"my duty",
"my injunction",
"against",
"and for the world",
"a single leaf",
"upon the interstate",
]
    
    function marching(){
      document.querySelector("h2").innerText = choice (responses)
    }
    
    function choice(list){
      return list [Math.floor(Math.random() * list.length)]
    }
</script>
