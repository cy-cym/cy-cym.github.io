            var i = 0;
var txt = 'It Makes Itself \n It Makes Itself Unknown To Thee \n Maybe These Poems Are Polyps
I Drank A Seagrams And Thought About It
Can I Just Be A Part of Goodness
Till I'm Blue In The Face With Meaning

March is long and goes on. I went on about it, about the days and the weeks overlapping. It's April now, there's a man walking laps in the parking lot, and a few minutes ago I thought "Wow this weather is perfect for a cigarette" but I don't want just any cigarette, I want one that A has rolled for me. The other day, the 31st, I had a sort of transcendent experience reading part of Jack Spicer's "Unvert Manifesto" -- I felt keenly aware of writing's ability to be both expansive and completely specific. In other words, I was SURPRISED. 

With writing, the margins between the artist and their work are smaller, and this is part of what makes poetry so special to me;  as a reader I'm privy to that nearness between the poet and their work, and I feel about as close as one can get to an unmediated SOURCE. 

So I was reading Spicer's "Unvert Manifesto," and there's a few  brilliantly funny lines about the Dadaists and their failed project: "All these men too obsessed with the mechanism of their subject...the frog Dada poets were mere bleeding-hearted sexual liberals who started out by proclaiming the absolute mastery of Dada and ended up writing poems about how nice their wives' tits look." Part of why I like this so much is because I'm still hung up on the horrible Man Ray exhibit I went to in January. And at the end of February, I watched "Un Chien Andalou" (which, ok, is maybe Surrealist, not Dadaist) and felt similarly frustrated, unmoved and uninterested in the idea that our unconscious world stems from and revolves around sex and violence against women. Maybe this frustration betrays the fact that I'm also a bleeding-hearted liberal, but I believe in a stranger world than that. 

Yesterday, I finished a book by a contemporary poet, and hardly anything in it surprised me. I've been realizing all I want is to be surprised by art, in life. I've decided that what I want is a great strangeness.';
var speed = 50;

function typeWriter1() {
  if (i < txt.length) {
    document.getElementById("demo1").innerHTML += txt.charAt(i);
    i++;
    setTimeout(typeWriter1, speed);
  }
}
