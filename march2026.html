  <h1>March..2026..</h1>

<h2 style="color: MidnightBlue; top: 80px; left: 120px"></h2>
<button id="button1" style="font-family: Times New Roman; font-weight: bold; color: MidnightBlue; top: 200px; left: 200px" onclick="marching()">Click Towards March</button>

<button id="button2" style="font-family: Times New Roman; font-weight: bold; color: MidnightBlue; top: 640px; left: 700px" onclick="update()">And More March</button>

<img id="holywater" style="visibility:hidden; width: 250px; left: 50px; top: 275px" title="Holy Water Dispenser" src="holywater.jpg" >
<img id="cy82" style="visibility:hidden; width: 250px; left: 310px; top: 275px" title="Cy climbing a sign" src="cy82.jpg" >
<img id="duckhollow" style="visibility:hidden; width: 250px; left: 570px; top: 275px" title="At the end of our walk" src="duckhollow.jpg" >
<img id="carwork" style="visibility:hidden; width: 250px; left: 830px; top: 275px" title="At the end of our walk" src="carwork.jpg" >



      <script>
  let responses = [
"aren't you bored yet?",
"everything burst forth",
"'This is the most miserable in my life'", //**from Claudia Rankine's Don't Let Me Be Lonely**//
"obliteration",
"'Objects, words must be led across time not preserved against it'", //** from Jack Spicer's After Lorca**//
"feet dirty from playing outside",
"birds with stripes on their heads",
"your ringlets appear",
"best burger of my life",
"as important to me as God",
"her hand went to fix her hair",
"consider my palm open",
"the two in the bathroom were both me",
"blood came out my mouth",
"'Or how I was trapped by my own film'", //**from Jean Cocteau's Blood of a Poet**//
"I drank a Seagrams and thought about it",
"how to not have this ultra-affected tone",
"I don't have to answer",
"I just have to press my skin and wonder",
"at that slightly pressed down feeling",
"does one grow into or out of goodness",
"can I just be a part of goodness",
"till its blue in the face with meaning"
]
    
    function marching(){
      document.querySelector("h2").innerText = choice(responses)
    }
    
    function choice(list){
      return list [Math.floor(Math.random() * list.length)]
    }

let counter = 0
  function update (){
    counter = counter + 1 
    if(counter==1){document.querySelector('#holywater').style.visibility = "visible"
    }
  
  if(counter==2){
      document.querySelector('#cy82').style.visibility = "visible"
    }
  
  if(counter==3){
      document.querySelector('#duckhollow').style.visibility = "visible"
    }
  
  if(counter==4){
      document.querySelector('#carwork').style.visibility = "visible"
    }}
</script>
